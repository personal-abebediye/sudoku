name: CI - Tests and Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test and Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test --coverage

      - name: Check test coverage
        continue-on-error: true
        run: |
          if ! command -v lcov &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y lcov
          fi

          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep -oP "lines......: \K[0-9.]+(?=%)")
          echo "Test coverage: $COVERAGE%"

          if (( $(echo "$COVERAGE < 80.0" | bc -l) )); then
            echo "⚠️  Coverage $COVERAGE% is below target 80%"
          else
            echo "✅ Coverage $COVERAGE% meets target"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: test

    strategy:
      matrix:
        include:
          - platform: Android
            os: ubuntu-latest
            build-cmd: |
              flutter build apk --release
              flutter build appbundle --release
            artifact-path: |
              build/app/outputs/flutter-apk/app-release.apk
              build/app/outputs/bundle/release/app-release.aab

          - platform: iOS
            os: macos-latest
            build-cmd: flutter build ios --release --no-codesign
            artifact-path: build/ios/iphoneos/Runner.app

          - platform: Web
            os: ubuntu-latest
            build-cmd: flutter build web --release
            artifact-path: build/web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build ${{ matrix.platform }}
        run: ${{ matrix.build-cmd }}

      - name: Upload ${{ matrix.platform }} Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build-${{ github.sha }}
          path: ${{ matrix.artifact-path }}
          retention-days: 30

