name: CI - Tests and Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test and Analyze
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Verify formatting
        run: dart format --set-exit-if-changed .
      
      - name: Analyze code
        run: flutter analyze
      
      - name: Run tests
        run: flutter test --coverage
      
      - name: Check test coverage
        continue-on-error: true  # Allow to pass for now while building infrastructure
        run: |
          # Install lcov if not available
          if ! command -v lcov &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y lcov
          fi
          
          # Calculate coverage percentage  
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep -oP "lines......: \K[0-9.]+(?=%)")
          echo "Test coverage: $COVERAGE%"
          
          # Warn if coverage is below 80% (not failing yet)
          if (( $(echo "$COVERAGE < 80.0" | bc -l) )); then
            echo "⚠️  Coverage $COVERAGE% is below target 80%"
          else
            echo "✅ Coverage $COVERAGE% meets target"
          fi
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: test  # Only run if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    # Manual approval required
    environment:
      name: production
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Activate Cider
        run: dart pub global activate cider
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
      - name: Analyze commits and bump version
        id: bump
        run: |
          # Get commits since last tag (or all commits if no tags)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --format="%s" HEAD)
          else
            COMMITS=$(git log --format="%s" ${LAST_TAG}..HEAD)
          fi
          
          # Check for breaking changes
          if echo "$COMMITS" | grep -qE "^[a-z]+(\(.+\))?!:|BREAKING CHANGE:"; then
            echo "Detected BREAKING CHANGE - bumping major version"
            cider bump major
            echo "bump_type=major" >> $GITHUB_OUTPUT
          # Check for new features
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            echo "Detected new feature - bumping minor version"
            cider bump minor
            echo "bump_type=minor" >> $GITHUB_OUTPUT
          # Check for fixes or other changes
          elif echo "$COMMITS" | grep -qE "^fix(\(.+\))?:|^perf(\(.+\))?:"; then
            echo "Detected fix/perf - bumping patch version"
            cider bump patch
            echo "bump_type=patch" >> $GITHUB_OUTPUT
          else
            echo "No significant changes detected - skipping version bump"
            echo "bump_type=none" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Get new version
          NEW_VERSION=$(cider version)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"
      
      - name: Update CHANGELOG
        if: steps.bump.outputs.bump_type != 'none'
        run: |
          cider release
          git add CHANGELOG.md pubspec.yaml
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new_version }}

Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
      
      - name: Create Git Tag
        if: steps.bump.outputs.bump_type != 'none'
        run: |
          git tag -a "v${{ steps.bump.outputs.new_version }}" -m "Release v${{ steps.bump.outputs.new_version }}"
      
      - name: Push changes
        if: steps.bump.outputs.bump_type != 'none'
        run: |
          git push origin main
          git push origin "v${{ steps.bump.outputs.new_version }}"
      
      - name: Create GitHub Release
        if: steps.bump.outputs.bump_type != 'none'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          release_name: Release v${{ steps.bump.outputs.new_version }}
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: false

