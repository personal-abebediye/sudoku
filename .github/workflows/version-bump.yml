name: Version Bump and Release

on:
  push:
    branches:
      - main

jobs:
  version-bump:
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Activate Cider
        run: dart pub global activate cider
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Analyze commits and bump version
        id: bump
        run: |
          # Get commits since last tag (or all commits if no tags)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --format="%s" HEAD)
          else
            COMMITS=$(git log --format="%s" ${LAST_TAG}..HEAD)
          fi
          
          # Check for breaking changes
          if echo "$COMMITS" | grep -qE "^[a-z]+(\(.+\))?!:|BREAKING CHANGE:"; then
            echo "Detected BREAKING CHANGE - bumping major version"
            cider bump major
            echo "bump_type=major" >> $GITHUB_OUTPUT
          # Check for new features
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            echo "Detected new feature - bumping minor version"
            cider bump minor
            echo "bump_type=minor" >> $GITHUB_OUTPUT
          # Check for fixes or other changes
          elif echo "$COMMITS" | grep -qE "^fix(\(.+\))?:|^perf(\(.+\))?:"; then
            echo "Detected fix/perf - bumping patch version"
            cider bump patch
            echo "bump_type=patch" >> $GITHUB_OUTPUT
          else
            echo "No significant changes detected - skipping version bump"
            echo "bump_type=none" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Get new version
          NEW_VERSION=$(cider version)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"
      
      - name: Update CHANGELOG
        if: steps.bump.outputs.bump_type != 'none'
        run: |
          cider release
          git add CHANGELOG.md pubspec.yaml
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new_version }}"
      
      - name: Create Git Tag
        if: steps.bump.outputs.bump_type != 'none'
        run: |
          git tag -a "v${{ steps.bump.outputs.new_version }}" -m "Release v${{ steps.bump.outputs.new_version }}"
      
      - name: Push changes
        if: steps.bump.outputs.bump_type != 'none'
        run: |
          git push origin main
          git push origin "v${{ steps.bump.outputs.new_version }}"
      
      - name: Create GitHub Release
        if: steps.bump.outputs.bump_type != 'none'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          release_name: Release v${{ steps.bump.outputs.new_version }}
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: false
